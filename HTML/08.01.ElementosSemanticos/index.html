<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos Semánticos</title>
    <link href="css/estilos.css" rel="stylesheet">
</head>
<body>
    <!-- ELEMENTOS SEMÁNTICOS -->
    <!-- Aportan una manera de organizar la página y facilitan la indexación por buscadores -->
    <!-- Visualmente, no tienen diferencias con los elementos DIV -->
    <!-- Estos elementos son reutilizables en varias páginas -->
    <!-- Algunos elementos semánticos: -->
    <!--    header  : encabezado de páigna-->
    <!--    nav     : barra de navegación -->
    <!--    section : distintas secciones en la página -->
    <!--    article : artículos, tipo tarjeta -->
    <!--    footer  : pié de página-->
    <header>
        <!-- Antes de HTML5 se utilizaba un DIV con class "section" y CSS -->
        <h1>Etiquetas Semánticas en HTML5</h1>
    </header>
    <nav>
        <!-- Barra de navegación -->
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Contacto</a>
        <a href="#">Acerca de...</a>
    </nav>
    <section>
        <h2>Sección 1</h2>
        <p>Información de la seccion</p>
        <aside>
            <p>Nombre del autor (Aside)</p>
        </aside>
    </section>
    <section>
        <h2>Sección 2</h2>
        <article>
            <h3>Atículo 1</h3>
        </article>
        <article>
            <h3>Artículo 2</h3>
        </article>
    </section>
    <footer>
        <a href="http://tr.ee/allann" target="_blank">Guatemallan Website</a>
    </footer>
</body>
</html>
