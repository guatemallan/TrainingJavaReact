<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iconos Google</title>

    <!-- ICONOS GOOGLE FONTS  -->
    <!-- Usamos @import en css -->
    <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/> -->
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <h1>
        <i class="material-icons">home</i>
        Iconos de Google</h1>
    <div>
        <p>
            <!-- El icono se especifica en el valor del elemento i, en este caso "search" -->
            <i class="material-icons">search</i>
            Búsqueda
        </p>
    </div>
    <div>
        <p>
            <!-- El icono se especifica en el valor del elemento i, en este caso "search" -->
            <i class="material-icons fondo">done</i>
            Tarea Completa. En este caso, el icono se alinea al fondo.
        </p>
    </div>
    <div>
        <p>
            <!-- El icono se especifica en el valor del elemento i, en este caso "search" -->
            <i class="material-icons fondo">arrow_right_alt</i>
            Derecha
        </p>
    </div>
</body>
</html>
