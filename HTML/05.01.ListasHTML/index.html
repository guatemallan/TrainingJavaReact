<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas HTML</title>
</head>
<body>
    <!-- En HTML hay 3 tipos de listas -->

    <!-- 1. Lista ordenada -->
    <!-- 2. Lista no ordenada -->
    <!-- 3. Lista de definicion -->
    <h1>Lista No Ordenada</h1>
    <!-- <ul> -- Unorder List, Lista no ordenada -->
    <ul style="list-style-type: disc;"> <!-- cambiamos el icono -->
        <li>Juan</li> <!-- List Item, Elemento de la lista -->
            <ul> <!-- Lista anidada -->
                <li>Tel. 555 23 4454</li>
                <li>Mail. juan@mail.com</li>
            </ul>
        <li>Maria</li>
        <li>Pedro</li>
            <ul> <!-- Lista anidada -->
                <li>Tel. 555 43 4567</li>
                <li>Mail. pedro@mail.com</li>
            </ul>
    </ul>
</body>
</html>
