<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios POST HTML</title>
</head>
<body>
    <!-- <form method="get"> -->

    <!-- Se modifica el URL del GET -->
    <!-- También se puede especificar un IP y Puertos diferentes -->
    <!-- ..InputSelectTextArea/mi-servidor?nombre=&apellido=&password=&email=&edad=&estatura=&autos=audi&comentario= -->
    <form action="mi-servidor" target="_self" autocomplete="off">
    <!-- El atributo target le dice al navegador donde se recibe la respuesta -->
    <!-- self - misma. blank - nueva ventana, -->
    <!-- autocomplete enciende o apaga las opciones de sugerencias de autocompletar -->

        <!-- Marco -->
        <fieldset>
            <legend>Datos personales</legend>

            <!-- ReadOnly, Disabled -->
            <!--  El parametro Disabled true omite el campo del StringQuery-->
            <label for="id">Identificacón: </label><br/>
            <input type="text" id="identificacion" name="identificacion" required="true" readonly="true" disabled="true" value="0101"/><br/>

            <!-- Input de tipo oculto -->
            <input type="hidden" id="sistema" name="sistema" value="SAP"/>

            <label for="nombre">Nombre: </label><br/>
            <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" required="true"/><br/>
            
            <label for="apellido">Apellido: </label><br/>
            <input type="text" id="apellido" name="apellido" placeholder="Escribe tu apellido" required="true"/><br/>

            <label for="password">Password: </label><br/>
            <input type="password" id="password" name="password" required="true"/><br/>

            <!-- Los caracteres especiales se codifican: @ -> %40-->
            <!-- /index.html?nombre=Juan&apellido=Lopez&password=324424&email=juan%40perez -->
            <label for="email">Email: </label><br/>
            <input type="email" id="email" name="email" required="true"/><br/>

            <label for="edad">Edad: </label><br/>
            <input type="number" id="edad" name="edad" required="true"/><br/>

            <!-- valores con punto decimal: step -->
            <!-- any : cualquier cantidad de digitos despues del punto -->
             <!-- 0.01, .01 : limita los digitos despues del punto a 2 -->
            <label for="fecha">Estatura en metros:  </label><br/>
            <input type="number" id="estatura" name="estatura" step=".01" required="true"/><br/>

            <label>Género</label><br/>
            <input type="radio" id="femenino" name="genero" value="femenino"/><label for="femenino">Femenino</label><br/>
            <input type="radio" id="masculino" name="genero" value="masculono"/><label for="masculino">Masculino</label><br/>
            <input type="radio" id="otro" name="genero" value="otro"/><label for="otro">Otro</label><br/>

            <label>Género musical favorito:</label><br/>
            <input type="checkbox" id="rock" name="generoMusical" value="Rock"/><label for="rock">Rock</label><br/>
            <input type="checkbox" id="pop" name="generoMusical" value="Pop"/><label for="pop">Pop</label><br/> 
            <input type="checkbox" id="electronica" name="generoMusical" value="Electronica"/><label for="electronica">Electrónica</label><br/> 
            <input type="checkbox" id="clasica" name="generoMusical" value="Clasica"/><label for="clasica">Clásica</label><br/>
            <input type="checkbox" id="reggae" name="generoMusical" value="Reggae"/><label for="reggae">Reggae</label><br/>

            <!-- Elementos tipo select -->
            <label for="autos">Marca auto: </label><br/>
            <!-- con "multiple" permitimos la seleccion de varias opciones -->
            <select id="autos" name="autos" required="true" multiple="true">
                <!-- selected = true es el default -->
                <option value="audi" selected="true">Audi</option>
                <option value="ford">Ford</option>
                <option value="chevrolet">Chevrolet</option>
                <option value="nissan">Nissan</option>
                <option value="honda">Honda</option>
                <option value="toyota">Toyota</option>
            </select><br/>

            <!-- elemento tipo text area -->
            <label for="comentario">Comentario:</label><br/>
            <textarea id="comentario" name="comentario" rows="2" cols="30" ></textarea><br/>

            <input type="submit" value="Enviar"/>
            <input type="submit" formnovalidate="formnovalidate" value="Enviar sin validar"/>
    
            <!-- Reset -->
            <input type="reset" value="Reestablecer..."/>

        </fieldset>
    </form>
</body>
</html>
