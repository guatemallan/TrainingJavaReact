<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iconos IONIC</title>

    <!-- ICONOS IONIC  -->
    <!-- En este caso, estamos usando una libreria JS.  -->
    <!-- Documentacion: https://ionic.io/ionicons/usage -->
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <h1>
        <!-- Doc en https://ionic.io/ionicons -->
        <ion-icon name="home-outline"></ion-icon>
        Iconos IONIC</h1>
    <div>
        <p>
            <!-- Doc en https://ionic.io/ionicons -->
            <ion-icon name="search-outline"></ion-icon>
            Búsqueda
        </p>
    </div>
    <div>
        <p>
            <ion-icon name="checkmark-outline" class="icono-grande"></ion-icon>
            Tarea Completa. En este caso, el icono se alinea al fondo.
        </p>
    </div>
    <div>
        <p>
            <ion-icon name="arrow-forward-outline" class="fondo"></ion-icon>
            Derecha
        </p>
    </div>
<!-- Habilitacion modulos JS de IONIC -->
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<!-- <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script> -->
</body>
</html>
