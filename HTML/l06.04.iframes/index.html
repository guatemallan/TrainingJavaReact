<body>
    <!-- el iframe es un marco donde se pueden cargar otros elementos HTML, ya sean locales o externos -->

</iframe>

    <a href="http://globalmentoring.com.mx" target="marco1" class="boton">Cargar sitio web externo...</a>
</div>
</body>
</html>
