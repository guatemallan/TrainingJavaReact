<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark HTML</title>
    <link href="./css/estilos.css" rel="stylesheet"/>
</head>
<body>
    <!-- El elemento ID sirve para identificar particularmente a un solo elemento, para un tratamiento distinto -->
    <!--  El ID debe ser único en toda la página, ya que puede causar problemas de JavaScript. Visualmente no habrá problema -->
    <h1 id="titulo-principal">Lenguajes de programación</h1>
    <!-- En el elemento Class se pueden aplicar varias clases para combinar los estilos -->
    <div class="tarjeta" id="java">
        <h2>Java</h2>
        <p><span class="titulo">Creador:</span> James Gosling</p>
    </div>
    <div class="tarjeta" id="python">
        <h2>Python</h2>
        <p><span class="titulo">Creador:</span> Guido van Rossum</p>
    </div>
    <div class="tarjeta" id="javascript">
        <h2>JavaScript</h2>
        <p><span class="titulo">Creador:</span> Brendan Eich</p>
    </div>
    <div>
        <h2>Resumen lenguajes de programación</h2>
        <p>Este es un texto de ejemplo.</p>
    </div>
    <br/>
    <!-- Usamos un ID como bookmark para hacer referencias dentro de la pagina -->
    <a href="#java">Volver a tarjeta Java</a> | <a href="#python">Volver a tarjeta Python</a> | <a href="#javascript">Volver a tarjeta JavaScript</a>
</body>
</html>
