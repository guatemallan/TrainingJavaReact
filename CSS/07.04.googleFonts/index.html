<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Fonts</title>
    <link href="css/estilos.css" rel="stylesheet"/>

    <!-- Al utlizar fuentes en linea, nuestra pagina puede tardar mas en cargar -->
    <!-- en el sitio de gootle fonts, al presionar GET, se facilita la opcion Embeded code, con los links a pegar en el encabezado del HTML -->
     <!-- la forma recomendada es @import en CSS, ver el archivo estilos.css, el código tambien es proporcionado en google fonts -->

    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Trocchi&display=swap" rel="stylesheet"> -->
</head>
<body>
    <h1 class="saira-stencil">Ejemplo de fuente Google Fonts</h1>
    <p class="open-sans-ejemplo">Este es un ejemplo de fuente importada desde Google Fonts, utilizando el metodo <strong>@import</strong> desde CSS.</p>
    <hr/>
    <!-- Uso de efecto de API google fonts V1 -->
     <!-- el efecto solo funciona si el import esté al inicio del archivo css -->
    <h1 class="font-effect-shadow-multiple">Uso de efectos V1</h1>
    <p>Irure sunt dolor fugiat excepteur labore.</p>
    <p class="fuente-roboto">Este es otro ejemplo utiliando la fuente roboto de google</p>
</body>
</html>
