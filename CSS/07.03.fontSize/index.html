<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuentes en CSS</title>
    <link href="css/estilos.css" rel="stylesheet"/>
</head>
<body>
    <h1>Fuentes en CSS</h1>

    <div class="caja caja-serif">
        <p class="fuente-times">Times New Roman (Serif)</p>
    </div>

    <div class="caja caja-serif">
        <p class="fuente-georgia">Georgia (Serif)</p>
    </div>

    <div class="caja caja-sansserif">
        <p class="fuente-arial">Arial (SansSerif)</p>
    </div>

    <div class="caja caja-sansserif">
        <p class="fuente-verdana">Verdana (SansSerif)</p>
    </div>

    <div class="caja caja-monospace">
        <p class="fuente-courier">Courier New (MonoSpace)</p>
    </div>

    <div class="caja caja-cursiva">
        <p class="fuente-lucida">Lucida Handwriting (Cursiva)</p>
    </div>
</body>
</html>
