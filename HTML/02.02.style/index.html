<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elementos Básicos HTML</title>

    <!-- Buenas prácticas -->
    <!-- 1. Siempre cerrar las etiquetas, aunque sea opcional como <br> <br/> -->
    <!-- 2. Nombres de etiquetas y atributos en minusculas -->
    <!-- 3. Usar comillas simples o dobles de forma consistente -->
    <!-- 4. siempre colocar un texto alternativo en las imagenes -->

</head>
<!--body style="background-color:aliceblue;"-->
<body>
    <h1>Universidad HTML</h1>

    <!-- 6. Manejo de colores HTML ****************************************************** -->
    <!--    Referencia colores en https://htmlcolorcodes.com/color-names/ -->
    <p style="color: crimson;">
        Color por nombre.
    </p>
    <p style="color: rgb(220, 20, 60);">
        Color por código RGB.
    </p>
    <p style="border:10px solid rgba(220, 20, 60, 0.5);">
        Color de borde código RGB con Transparencia.
    </p>

    <p style="color: hsl(348, 83%, 47%);">
        Color por código HSL.
    </p>
    <p style="border:10px solid hsla(348, 83%, 47%, 0.5);">
        Color de borde código HSL con Transparencia.
    </p>
    <p style="color: #dc143c;">
        Color por código Hexadecimal.
    </p>
    
</body>
</html>
