<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributo Class HTML</title>
    <link href="./css/estilos.css" rel="stylesheet"/>
</head>
<body>
    <!-- El elemento CLASS sirve pera aplicar estilos a varios elementos a la vez, siempre que identificados con la misma clase -->
    <h1>Lenguajes de programación</h1>
    <!-- En el elemento Class se pueden aplicar varias clases para combinar los estilos -->
    <div class="tarjeta">
        <h2>Java</h2>
        <p><span class="titulo">Creador:</span> James Gosling</p>
    </div>
    <div class="tarjeta">
        <h2>Python</h2>
        <p><span class="titulo">Creador:</span> Guido van Rossum</p>
    </div>
    <div class="tarjeta">
        <h2>JavaScript</h2>
        <p><span class="titulo">Creador:</span> Brendan Eich</p>
    </div>
    <div>
        <h2>Resumen lenguajes de programación</h2>
        <p>Este es un texto de ejemplo.</p>
    </div>
</body>
</html>
