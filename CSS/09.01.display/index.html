<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propiedad Display</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <!-- Elementos tipo bloque -->
    <!--   Se representan en una nueva linea-->
    <h2>Elementos block</h2>
    <h1>Titulo</h1>
    <div>Div</div>
    <p>Párrafo</p>
    <hr/>

    <!-- el elemento span por default es inline -->
    <h2>Elementos Inline</h2>
    <p>Texto con <span>salto de linea</span></p>

    <a href="#">Link1</a> 
    <a href="#">Link2</a>
    <a href="#">Link3</a> 

    <ul>
        <!-- Estos son elementos tipo block -->
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
</body>
</html>
